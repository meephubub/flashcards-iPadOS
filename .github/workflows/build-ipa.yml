name: Build Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build archive (unsigned)
        run: |
          xcodebuild clean archive \
            -project FlashcardsiPadOS.xcodeproj \
            -scheme FlashcardsiPadOS \
            -destination 'generic/platform=iOS' \
            -archivePath build/FlashcardsiPadOS.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/FlashcardsiPadOS.xcarchive/Products/Applications/*.app Payload/
          zip -r FlashcardsiPadOS.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlashcardsiPadOS-unsigned
          path: FlashcardsiPadOS.ipa
          retention-days: 90
